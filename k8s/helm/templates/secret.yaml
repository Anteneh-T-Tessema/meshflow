{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meshflow.fullname" . }}-secrets
  labels:
    {{- include "meshflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-keys: {{ .Values.apiKeys | quote }}
  webhook-secret: {{ .Values.webhookSecret | quote }}
{{- end }}
