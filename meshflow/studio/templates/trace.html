<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeshFlow Trace Viewer</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --orange: #e3b341; --purple: #bc8cff;
    --commit: #3fb950; --reject: #f85149; --escalate: #d29922;
    --blocked: #f85149; --ok: #3fb950;
    --bar-h: 8px; --card-r: 8px; --mono: 'SF Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; font-size: 14px; }

  /* ── Layout ── */
  .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; overflow: hidden; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .main { display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  .header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .5px; }
  .header-run-id { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; font-family: inherit; }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }
  .btn-primary:hover { opacity: .85; }
  .btn-sm { padding: 3px 8px; font-size: 11px; }
  .spacer { flex: 1; }

  /* ── Sidebar runs list ── */
  .sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
  .runs-list { flex: 1; overflow-y: auto; }
  .run-item { padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  .run-item:hover { background: rgba(88,166,255,.06); }
  .run-item.active { background: rgba(88,166,255,.12); border-left: 3px solid var(--accent); }
  .run-item-id { font-family: var(--mono); font-size: 11px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .empty-sidebar { padding: 24px 16px; color: var(--muted); font-size: 12px; text-align: center; }

  /* ── Main: summary bar ── */
  .summary-bar { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .metric { display: flex; flex-direction: column; gap: 2px; }
  .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
  .metric-value { font-size: 16px; font-weight: 600; font-family: var(--mono); }
  .metric-value.green { color: var(--green); }
  .metric-value.red { color: var(--red); }
  .chain-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .chain-badge.valid { background: rgba(63,185,80,.15); color: var(--green); }
  .chain-badge.invalid { background: rgba(248,81,73,.15); color: var(--red); }

  /* ── Waterfall timeline ── */
  .timeline-wrap { padding: 16px 20px 8px; border-bottom: 1px solid var(--border); }
  .timeline-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .timeline-track { position: relative; height: var(--bar-h); background: var(--border); border-radius: 4px; overflow: hidden; }
  .timeline-seg { position: absolute; top: 0; height: 100%; border-radius: 2px; cursor: pointer; transition: opacity .15s; }
  .timeline-seg:hover { opacity: .75; }
  .timeline-seg.commit { background: var(--green); }
  .timeline-seg.reject { background: var(--red); }
  .timeline-seg.escalate { background: var(--yellow); }
  .timeline-seg.blocked { background: var(--orange); }

  /* ── Steps list ── */
  .steps-wrap { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }
  .step-card { border: 1px solid var(--border); border-radius: var(--card-r); overflow: hidden; transition: border-color .15s; }
  .step-card:hover { border-color: var(--accent); }
  .step-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .step-card.verdict-reject { border-left: 3px solid var(--red); }
  .step-card.verdict-escalate { border-left: 3px solid var(--yellow); }
  .step-card.verdict-blocked { border-left: 3px solid var(--orange); }
  .step-card.verdict-commit { border-left: 3px solid var(--green); }

  .step-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; background: var(--surface); }
  .step-idx { font-size: 11px; color: var(--muted); min-width: 20px; }
  .step-name { font-weight: 600; font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kind-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(88,166,255,.15); color: var(--accent); font-family: var(--mono); }
  .verdict-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
  .verdict-commit   { background: rgba(63,185,80,.15);  color: var(--green); }
  .verdict-reject   { background: rgba(248,81,73,.15);  color: var(--red); }
  .verdict-escalate { background: rgba(210,153,34,.15); color: var(--yellow); }
  .verdict-blocked  { background: rgba(227,179,65,.15); color: var(--orange); }

  .step-metrics { display: flex; gap: 14px; margin-left: auto; align-items: center; }
  .step-metric { font-size: 11px; font-family: var(--mono); color: var(--muted); white-space: nowrap; }
  .step-metric span { color: var(--text); }

  .step-dur-bar { height: 3px; background: var(--border); border-radius: 2px; margin: 0 14px 8px; overflow: hidden; }
  .step-dur-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .3s; }

  .step-body { padding: 0 14px 12px; display: none; }
  .step-body.open { display: block; }
  .step-section { margin-top: 10px; }
  .step-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 4px; }
  .step-pre { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; font-family: var(--mono); font-size: 11px; color: var(--text); white-space: pre-wrap; word-break: break-word; max-height: 160px; overflow-y: auto; }
  .step-pre.red { border-color: rgba(248,81,73,.3); }
  .rewind-btn { margin-top: 10px; }
  .hash-line { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Empty state ── */
  .empty-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); }
  .empty-main h2 { font-size: 18px; color: var(--text); }
  .empty-main p { font-size: 13px; max-width: 320px; text-align: center; }

  /* ── Rewind modal ── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 440px; }
  .modal h3 { margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-family: var(--mono); font-size: 12px; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; z-index: 200; display: none; }
  .toast.show { display: block; animation: fadeIn .2s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<nav style="background:#141623;border-bottom:1px solid rgba(255,255,255,0.08);padding:8px 20px;display:flex;align-items:center;gap:16px;font-size:0.82rem;">
  <span style="font-weight:700;color:#6366f1;margin-right:8px;">MeshFlow Studio</span>
  <a href="/trace" style="color:#9ca3af;text-decoration:none;padding:4px 10px;border-radius:5px;" onmouseover="this.style.color='#f3f4f6'" onmouseout="this.style.color='#9ca3af'">🔍 Trace</a>
  <a href="/graph" style="color:#9ca3af;text-decoration:none;padding:4px 10px;border-radius:5px;" onmouseover="this.style.color='#f3f4f6'" onmouseout="this.style.color='#9ca3af'">🗺 Graph</a>
  <a href="/rag"   style="color:#9ca3af;text-decoration:none;padding:4px 10px;border-radius:5px;" onmouseover="this.style.color='#f3f4f6'" onmouseout="this.style.color='#9ca3af'">📚 RAG Builder</a>
  <a href="/"      style="color:#9ca3af;text-decoration:none;padding:4px 10px;border-radius:5px;" onmouseover="this.style.color='#f3f4f6'" onmouseout="this.style.color='#9ca3af'">⚡ Workflow</a>
</nav>

<div class="app">
  <!-- Sidebar: run list -->
  <aside class="sidebar">
    <div class="sidebar-header">Recent Runs</div>
    <div class="runs-list" id="runsList">
      <div class="loading">Loading…</div>
    </div>
  </aside>

  <!-- Main panel -->
  <div class="main" id="mainPanel">
    <div class="empty-main" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-3-3v6M12 3a9 9 0 1 1 0 18A9 9 0 0 1 12 3z"/></svg>
      <h2>Select a run</h2>
      <p>Choose a run from the sidebar to view its step-by-step execution trace.</p>
    </div>
    <div id="traceView" style="display:none; flex-direction:column; height:100%; overflow:hidden;">
      <!-- Header -->
      <div class="header">
        <span class="logo">⚡ MeshFlow Trace</span>
        <span class="header-run-id" id="headerRunId"></span>
        <div class="spacer"></div>
        <div class="live-dot" id="liveDot" style="display:none"></div>
        <button class="btn btn-sm" onclick="exportLangSmith()">↗ Export LangSmith</button>
        <button class="btn btn-sm" onclick="copyRunId()">⎘ Copy ID</button>
      </div>

      <!-- Summary metrics -->
      <div class="summary-bar" id="summaryBar"></div>

      <!-- Waterfall timeline -->
      <div class="timeline-wrap">
        <div class="timeline-label">Execution timeline</div>
        <div class="timeline-track" id="timelineTrack"></div>
      </div>

      <!-- Step cards -->
      <div class="steps-wrap" id="stepsWrap"></div>
    </div>
  </div>
</div>

<!-- Rewind modal -->
<div class="modal-bg" id="rewindModal">
  <div class="modal">
    <h3>⏪ Rewind &amp; Re-run</h3>
    <p style="font-size:12px; color:var(--muted); margin-bottom:16px;">
      Re-run from step <strong id="rewindStepLabel"></strong> with an optional model or prompt override.
    </p>
    <div class="form-group">
      <label class="form-label">Model override (e.g. claude-haiku-4-5)</label>
      <input class="form-input" id="rewindModel" placeholder="leave blank to keep original">
    </div>
    <div class="form-group">
      <label class="form-label">System prompt override</label>
      <textarea class="form-input" id="rewindPrompt" rows="3" placeholder="leave blank to keep original"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeRewind()">Cancel</button>
      <button class="btn btn-primary" onclick="submitRewind()">Run</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';  // same-origin
let currentRunId = '';
let currentTrace = null;
let rewindStep = null;
let liveSource = null;

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  await loadRuns();
  const params = new URLSearchParams(location.search);
  const rid = params.get('run_id');
  if (rid) loadTrace(rid);
}

// ── Runs list ─────────────────────────────────────────────────────────────────

async function loadRuns() {
  const el = document.getElementById('runsList');
  try {
    const r = await fetch(`${API}/api/runs`);
    const runs = await r.json();
    if (!runs.length) {
      el.innerHTML = '<div class="empty-sidebar">No runs found.<br>Run a workflow first.</div>';
      return;
    }
    el.innerHTML = runs.map(run => {
      const id = run.run_id || run.id || '?';
      const steps = run.steps || '?';
      const cost = run.total_cost_usd != null ? `$${Number(run.total_cost_usd).toFixed(5)}` : '';
      return `
        <div class="run-item" id="ri-${id}" onclick="loadTrace('${id}')">
          <div class="run-item-id">${id}</div>
          <div class="run-item-meta">${steps} steps ${cost}</div>
        </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty-sidebar">Error: ${e.message}</div>`;
  }
}

// ── Trace view ────────────────────────────────────────────────────────────────

async function loadTrace(runId) {
  currentRunId = runId;
  document.querySelectorAll('.run-item').forEach(el => el.classList.remove('active'));
  const ri = document.getElementById(`ri-${runId}`);
  if (ri) ri.classList.add('active');

  document.getElementById('emptyState').style.display = 'none';
  const tv = document.getElementById('traceView');
  tv.style.display = 'flex';
  document.getElementById('stepsWrap').innerHTML = '<div class="loading">Loading trace…</div>';

  try {
    const r = await fetch(`${API}/api/trace/${runId}`);
    const trace = await r.json();
    currentTrace = trace;
    renderTrace(trace);
    history.replaceState(null, '', `?run_id=${runId}`);
  } catch (e) {
    document.getElementById('stepsWrap').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

function renderTrace(trace) {
  document.getElementById('headerRunId').textContent = trace.run_id;
  renderSummary(trace);
  renderTimeline(trace);
  renderSteps(trace);
}

function renderSummary(trace) {
  const s = trace.summary || {};
  const chainValid = trace.chain_valid !== false;
  const totalMs = trace.total_duration_ms || 0;
  document.getElementById('summaryBar').innerHTML = `
    <div class="metric">
      <div class="metric-label">Steps</div>
      <div class="metric-value">${s.steps || trace.steps.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Duration</div>
      <div class="metric-value">${(totalMs/1000).toFixed(2)}s</div>
    </div>
    <div class="metric">
      <div class="metric-label">Tokens</div>
      <div class="metric-value">${(s.total_tokens||0).toLocaleString()}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Cost</div>
      <div class="metric-value">$${Number(s.total_cost_usd||0).toFixed(5)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Blocked</div>
      <div class="metric-value ${(s.blocked||0) > 0 ? 'red' : 'green'}">${s.blocked||0}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Chain</div>
      <div class="chain-badge ${chainValid ? 'valid' : 'invalid'}">${chainValid ? '✓ valid' : '✗ broken'}</div>
    </div>`;
}

function renderTimeline(trace) {
  const track = document.getElementById('timelineTrack');
  const total = trace.total_duration_ms || 1;
  track.innerHTML = trace.steps.map(s => {
    const left = (s.start_ms / total * 100).toFixed(2);
    const width = Math.max(0.5, s.duration_ms / total * 100).toFixed(2);
    const cls = s.blocked ? 'blocked' : s.verdict;
    const title = `${s.node_id} — ${s.duration_ms}ms`;
    return `<div class="timeline-seg ${cls}" style="left:${left}%;width:${width}%;" title="${title}" onclick="scrollToStep(${s.idx})"></div>`;
  }).join('');
}

function renderSteps(trace) {
  const wrap = document.getElementById('stepsWrap');
  const maxDur = Math.max(...trace.steps.map(s => s.duration_ms), 1);
  wrap.innerHTML = trace.steps.map(s => {
    const verdict = s.blocked ? 'blocked' : s.verdict;
    const durPct = (s.duration_ms / maxDur * 100).toFixed(1);
    const outputCls = verdict === 'reject' ? ' red' : '';
    return `
      <div class="step-card verdict-${verdict}" id="step-${s.idx}" onclick="toggleStep(${s.idx}, event)">
        <div class="step-header">
          <span class="step-idx">#${s.idx}</span>
          <span class="step-name">${esc(s.node_id)}</span>
          <span class="kind-badge">${esc(s.node_kind)}</span>
          <span class="verdict-badge verdict-${verdict}">${verdict}</span>
          <div class="step-metrics">
            <span class="step-metric"><span>${s.duration_ms}ms</span></span>
            <span class="step-metric"><span>${s.tokens_used}</span> tok</span>
            <span class="step-metric"><span>$${s.cost_usd.toFixed(5)}</span></span>
            <span class="step-metric" title="uncertainty"><span>${(s.uncertainty*100).toFixed(1)}%</span> unc</span>
          </div>
        </div>
        <div class="step-dur-bar">
          <div class="step-dur-fill" style="width:${durPct}%;background:${verdictColor(verdict)}"></div>
        </div>
        <div class="step-body" id="body-${s.idx}">
          ${s.block_reason ? `<div class="step-section"><div class="step-section-label">Block reason</div><div class="step-pre red">${esc(s.block_reason)}</div></div>` : ''}
          <div class="step-section">
            <div class="step-section-label">Input</div>
            <div class="step-pre">${esc(s.input_preview || '(none)')}</div>
          </div>
          <div class="step-section">
            <div class="step-section-label">Output</div>
            <div class="step-pre${outputCls}">${esc(s.output_preview || '(none)')}</div>
          </div>
          <div class="step-section">
            <div class="step-section-label">Metrics</div>
            <div class="step-pre">tokens: ${s.tokens_used}  cost: $${s.cost_usd}  carbon: ${s.carbon_gco2}gCO₂  start: +${s.start_ms}ms</div>
          </div>
          <div class="hash-line">hash: ${s.entry_hash}</div>
          <button class="btn btn-sm rewind-btn" onclick="openRewind(${s.idx}, event)">⏪ Rewind to here</button>
        </div>
      </div>`;
  }).join('');
}

function toggleStep(idx, event) {
  if (event.target.closest('.rewind-btn')) return;
  const body = document.getElementById(`body-${idx}`);
  const card = document.getElementById(`step-${idx}`);
  const open = body.classList.toggle('open');
  card.classList.toggle('selected', open);
}

function scrollToStep(idx) {
  const el = document.getElementById(`step-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function verdictColor(v) {
  return { commit:'#3fb950', reject:'#f85149', escalate:'#d29922', blocked:'#e3b341' }[v] || '#58a6ff';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Rewind ────────────────────────────────────────────────────────────────────

function openRewind(stepIdx, event) {
  event.stopPropagation();
  rewindStep = stepIdx;
  document.getElementById('rewindStepLabel').textContent = `#${stepIdx}`;
  document.getElementById('rewindModel').value = '';
  document.getElementById('rewindPrompt').value = '';
  document.getElementById('rewindModal').classList.add('open');
}

function closeRewind() {
  document.getElementById('rewindModal').classList.remove('open');
}

async function submitRewind() {
  const body = {
    run_id: currentRunId,
    step_idx: rewindStep,
    model_override: document.getElementById('rewindModel').value.trim(),
    prompt_override: document.getElementById('rewindPrompt').value.trim(),
  };
  closeRewind();
  toast('Rewinding… this may take a moment.');
  try {
    const r = await fetch(`${API}/api/rewind`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const result = await r.json();
    if (result.ok) {
      toast(`Rewind complete → ${result.new_run_id} (${result.steps_replayed} steps)`);
      await loadRuns();
      setTimeout(() => loadTrace(result.new_run_id), 500);
    } else {
      toast(`Rewind failed: ${result.error}`);
    }
  } catch (e) {
    toast(`Error: ${e.message}`);
  }
}

// ── Export / copy ─────────────────────────────────────────────────────────────

function exportLangSmith() {
  if (!currentTrace) return;
  const blob = new Blob([JSON.stringify(currentTrace, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `trace-${currentRunId}.json`;
  a.click();
}

function copyRunId() {
  navigator.clipboard.writeText(currentRunId).then(() => toast('Run ID copied!'));
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────

init();
</script>
</body>
</html>
