replicaCount: 1

image:
  repository: meshflow
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: meshflow.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  mountPath: /data

env:
  MESHFLOW_HOST: "0.0.0.0"
  MESHFLOW_PORT: "8000"
  MESHFLOW_CORS_ORIGINS: "*"
  MESHFLOW_LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  OTEL_SERVICE_NAME: meshflow

secrets:
  # Set these in a values override or via --set secrets.anthropicApiKey=...
  anthropicApiKey: ""
  openaiApiKey: ""
  webhookSecret: ""
  apiKeys: ""

livenessProbe:
  httpGet:
    path: /health/live
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
