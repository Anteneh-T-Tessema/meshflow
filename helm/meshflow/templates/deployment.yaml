apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meshflow.fullname" . }}
  labels:
    {{- include "meshflow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "meshflow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "meshflow.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: meshflow
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: MESHFLOW_LEDGER_PATH
              value: {{ .Values.persistence.mountPath }}/runs.db
            - name: MESHFLOW_REGISTRY_PATH
              value: {{ .Values.persistence.mountPath }}/registry.db
            - name: MESHFLOW_BUDGET_PATH
              value: {{ .Values.persistence.mountPath }}/budgets.db
            {{- if .Values.secrets.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "meshflow.fullname" . }}-secrets
                  key: anthropic-api-key
            {{- end }}
            {{- if .Values.secrets.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "meshflow.fullname" . }}-secrets
                  key: openai-api-key
            {{- end }}
            {{- if .Values.secrets.webhookSecret }}
            - name: MESHFLOW_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "meshflow.fullname" . }}-secrets
                  key: webhook-secret
            {{- end }}
            {{- if .Values.secrets.apiKeys }}
            - name: MESHFLOW_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "meshflow.fullname" . }}-secrets
                  key: api-keys
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          command:
            - meshflow
            - serve
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --ledger
            - {{ .Values.persistence.mountPath }}/runs.db
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "meshflow.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
