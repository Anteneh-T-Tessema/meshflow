{{- if or .Values.secrets.anthropicApiKey .Values.secrets.openaiApiKey .Values.secrets.webhookSecret .Values.secrets.apiKeys }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meshflow.fullname" . }}-secrets
  labels:
    {{- include "meshflow.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc }}
  {{- end }}
  {{- if .Values.secrets.webhookSecret }}
  webhook-secret: {{ .Values.secrets.webhookSecret | b64enc }}
  {{- end }}
  {{- if .Values.secrets.apiKeys }}
  api-keys: {{ .Values.secrets.apiKeys | b64enc }}
  {{- end }}
{{- end }}
