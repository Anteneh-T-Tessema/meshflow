name: Publish Java SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.14.0)"
        required: false
        default: "1.14.0"

jobs:
  publish:
    name: Publish meshflow-sdk to Maven Central
    runs-on: ubuntu-latest
    env:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      OSSRH_USERNAME:       ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD:       ${{ secrets.OSSRH_PASSWORD }}

    defaults:
      run:
        working-directory: sdks/java

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify version matches input
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          INPUT="${{ github.event.inputs.version }}"
          echo "pom.xml version: $POM_VERSION  |  input: $INPUT"
          if [ -n "$INPUT" ] && [ "$POM_VERSION" != "$INPUT" ]; then
            echo "::error::pom.xml version ($POM_VERSION) does not match input ($INPUT)"
            exit 1
          fi

      - name: Build and run tests
        run: mvn --no-transfer-progress verify

      - name: Publish to Maven Central (OSSRH)
        if: env.OSSRH_USERNAME != '' && env.OSSRH_PASSWORD != ''
        run: |
          mvn --no-transfer-progress \
            --batch-mode \
            -Dgpg.passphrase="${MAVEN_GPG_PASSPHRASE}" \
            clean deploy \
            -P release \
            -DskipTests
        env:
          OSSRH_USERNAME:       ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD:       ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Skip — missing OSSRH credentials
        if: env.OSSRH_USERNAME == '' || env.OSSRH_PASSWORD == ''
        run: |
          echo "::warning::OSSRH_USERNAME or OSSRH_PASSWORD not set — skipping Maven Central publish."
          echo "Add Sonatype OSSRH credentials as repo secrets to enable:"
          echo "  OSSRH_USERNAME       — your Sonatype JIRA / Central Portal username"
          echo "  OSSRH_PASSWORD       — your token / password"
          echo "  MAVEN_GPG_PRIVATE_KEY — exported GPG private key (ascii-armored)"
          echo "  MAVEN_GPG_PASSPHRASE  — GPG key passphrase"
          echo ""
          echo "Create a Sonatype account at: https://central.sonatype.com/"
          echo "Namespace to claim: dev.meshflow"
