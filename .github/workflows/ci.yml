name: CI

on:
  push:
    branches: [main, "sprint/*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          # aiohttp + cryptography may not be in dev extras on all platforms
          pip install "aiohttp>=3.9.0" "cryptography>=42.0.0"
          # Ensure meshflow CLI is on PATH (pip user installs go to ~/.local/bin)
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          python -c "import sysconfig; print(sysconfig.get_path('scripts'))" >> "$GITHUB_PATH" || true

      - name: Debug environment
        run: |
          python --version
          which meshflow || echo "meshflow not in PATH"
          python -c "import meshflow; print('meshflow OK', meshflow.__version__)"
          python -c "import pytest_asyncio; print('pytest_asyncio', pytest_asyncio.__version__)"
          # Validate test collection (no asyncio-mode flag - let pyproject.toml handle it)
          MESHFLOW_MOCK=1 python -m pytest tests/ --collect-only -q \
            --ignore=tests/test_integration.py 2>&1 | tail -5

      - name: Run tests
        env:
          MESHFLOW_MOCK: "1"
          ANTHROPIC_API_KEY: ""
        run: |
          set -o pipefail
          python -m pytest tests/ --tb=long -v \
            --ignore=tests/test_integration.py \
            -x 2>&1 | tee /tmp/test_out.txt

      - name: Show test output on failure
        if: failure()
        run: |
          echo "## Test Failure Output (Python ${{ matrix.python-version }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -200 /tmp/test_out.txt >> "$GITHUB_STEP_SUMMARY" || echo "no test output file" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -200 /tmp/test_out.txt || echo "no test output file"

      - name: Save test tail on failure
        if: failure()
        run: |
          echo "=== FAILED TESTS ===" > /tmp/test_tail.txt
          grep -E "^FAILED|^ERROR" /tmp/test_out.txt >> /tmp/test_tail.txt || true
          echo "=== LAST 80 LINES ===" >> /tmp/test_tail.txt
          tail -80 /tmp/test_out.txt >> /tmp/test_tail.txt || true

      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-py${{ matrix.python-version }}
          path: /tmp/test_tail.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: .pytest_cache/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e . mypy
      - name: mypy (non-strict)
        run: |
          python -m mypy meshflow/core/schemas.py \
                        meshflow/security/api_keys.py \
                        meshflow/core/policy_loader.py \
                        meshflow/observability/otel_exporter.py \
                        --ignore-missing-imports \
                        --no-strict-optional \
            || true  # non-blocking until all stubs are added

  benchmark:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Run quick benchmark
        env:
          MESHFLOW_MOCK: "1"
        run: |
          python benchmarks/bench_core.py --concurrency 10 --quick \
            --output /tmp/bench_results.json || true
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/bench_results.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          ruff check meshflow/ --select E,W,F \
            --ignore E501,W503,F401,F811 \
            || true  # advisory only
