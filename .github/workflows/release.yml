name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write   # for OIDC trusted publishing (needs PyPI trusted publisher configured)

jobs:
  verify:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Full test suite
        env:
          MESHFLOW_MOCK: "1"
        run: |
          python -m pytest tests/ --tb=short -q \
            --ignore=tests/test_integration.py

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(python -c "import meshflow; print(meshflow.__version__)")
          TOML_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag: $TAG  __version__: $VERSION  pyproject: $TOML_VERSION"
          if [ "$TAG" != "$VERSION" ] || [ "$TAG" != "$TOML_VERSION" ]; then
            echo "Version mismatch — aborting release"
            exit 1
          fi

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (token)
        if: env.PYPI_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          print-hash: true
          skip-existing: true

      - name: Skip PyPI — no PYPI_API_TOKEN secret configured
        if: env.PYPI_TOKEN == ''
        run: |
          echo "::warning::PYPI_API_TOKEN secret not set — skipping PyPI publish."
          echo "Add a PyPI API token as a repo secret named PYPI_API_TOKEN to enable."

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 - <<'PYEOF'
          import re, os
          version = os.environ.get("VERSION", "")
          with open("CHANGELOG.md") as f:
              content = f.read()
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"notes<<EOF\n{notes}\nEOF\n")
          PYEOF
        env:
          VERSION: ${{ github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          generate_release_notes: false
