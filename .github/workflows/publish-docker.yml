name: Publish Docker MCP Image

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push meshflow-mcp Docker image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR only
        if: env.DOCKERHUB_USERNAME == ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.mcp
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/meshflow-mcp:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/meshflow-mcp:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=MeshFlow MCP Server — governed multi-agent orchestration
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Docker Hub + GHCR
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.mcp
          push: true
          tags: |
            antenehcodding/meshflow-mcp:${{ steps.version.outputs.version }}
            antenehcodding/meshflow-mcp:latest
            ghcr.io/${{ github.repository_owner }}/meshflow-mcp:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/meshflow-mcp:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=MeshFlow MCP Server — governed multi-agent orchestration
          cache-from: type=gha
          cache-to: type=gha,mode=max
